<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.16/dist/tailwind.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>
<body class="bg-gray-200">
    <nav class="bg-blue-500 p-4 text-white shadow-md">
        <div class="container mx-auto">
            <div class="flex justify-between">
                <div>
                    <a href="index.html">
                        <img src="Images/Logo.svg" alt="Logo" class="h-12 w-auto">
                    </a>
                </div>
                <div>
                    <a href="index.html" class="nav-link">Home</a>
                    <a href="About.html" class="nav-link">About</a>
                    <a href="Contact.html" class="nav-link">Contact</a>
                </div>
            </div>
        </div>
    </nav>
    <div class="form-container mx-auto w-full max-w-md mt-10">
        <h2 class="form-title text-2xl mb-5 text-center">Contact Us</h2>
        <form action="form.php" method="post" class="bg-white shadow-md rounded px-8 pt-6 pb-8 mb-4">
            <div class="mb-4">
                <label for="name" class="block text-gray-700 text-sm font-bold mb-2">Name:</label>
                <input type="text" id="name" name="name" required class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline">
            </div>
            <div class="mb-4">
                <label for="email" class="block text-gray-700 text-sm font-bold mb-2">Email:</label>
                <input type="email" id="email" name="email" required class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline">
            </div>
            <div class="mb-6">
                <label for="message" class="block text-gray-700 text-sm font-bold mb-2">Message:</label>
                <textarea id="message" name="message" required class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"></textarea>
            </div>
            <input type="submit" value="Submit" class="form-submit bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline">
        </form>
    </div>
</body>
</html>
