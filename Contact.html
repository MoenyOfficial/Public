            <script>
                // Original times in GMT
                const originalTimes = {
                    time1: { start: '15:00:00', end: '21:00:00' },
                    time2: { start: '18:30:00', end: '21:00:00' },
                    time3: { start: '17:30:00', end: '21:00:00' },
                    time4: { start: '12:30:00', end: '21:00:00' },
                    time5: { start: '17:30:00', end: '21:00:00' },
                    time6: { start: '14:00:00', end: '21:00:00' },
                    time7: { start: '12:00:00', end: '21:00:00' }
                };

                const timezoneSelect = document.getElementById('timezone');
                const timeElements = document.querySelectorAll('.schedule p[id^="time"]');

                function updateSchedule() {
                    const selectedTimezone = timezoneSelect.value;

                    timeElements.forEach((timeElement) => {
                        const originalTime = originalTimes[timeElement.id];
                        const dateInGMTStart = new Date(`1970-01-01T${originalTime.start}Z`); // Z ensures the time is treated as GMT
                        const dateInGMTEnd = new Date(`1970-01-01T${originalTime.end}Z`); // Z ensures the time is treated as GMT
                        let timeInSelectedTimezoneStart = dateInGMTStart.toLocaleTimeString('en-US', { timeZone: selectedTimezone, hour: '2-digit', minute: '2-digit' });
                        let timeInSelectedTimezoneEnd = dateInGMTEnd.toLocaleTimeString('en-US', { timeZone: selectedTimezone, hour: '2-digit', minute: '2-digit' });

                        if (selectedTimezone === 'Europe/London') {
                            // Subtract one hour for London
                            timeInSelectedTimezoneStart = new Date(dateInGMTStart - 3600 * 1000).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
                            timeInSelectedTimezoneEnd = new Date(dateInGMTEnd - 3600 * 1000).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
                        }

                        timeElement.textContent = `${timeInSelectedTimezoneStart} - ${timeInSelectedTimezoneEnd}`;
                    });
                }

                timezoneSelect.addEventListener('change', updateSchedule);

                // Update the schedule immediately on page load
                updateSchedule();

            </script>
