        <div class="bg-blue-100 border-l-4 border-blue-500 text-blue-700 p-4 mt-5" role="alert">
            <p class="font-bold mb-2">Working Hours</p>
            <div class="schedule grid grid-cols-2 gap-2">
                <div class="flex items-center">
                    <p class="mr-2 font-semibold">Monday:</p>
                    <img src="Images/clock.png" alt="Clock Icon" class="h-6 w-6 inline-block mr-2">

                    <p class="mr-2 font-semibold">Tuesday:</p>
                    <img src="Images/clock.png" alt="Clock Icon" class="h-6 w-6 inline-block mr-2">
                    <p id="time2"></p>
                </div>
                <div class="flex items-center">
                    <p class="mr-2 font-semibold">Wednesday:</p>
                    <img src="Images/clock.png" alt="Clock Icon" class="h-6 w-6 inline-block mr-2">
                    <p id="time3"></p>
                </div>
                <div class="flex items-center">
                    <p class="mr-2 font-semibold">Thursday:</p>
                    <img src="Images/clock.png" alt="Clock Icon" class="h-6 w-6 inline-block mr-2">

                    <p class="mr-2 font-semibold">Sunday:</p>
                    <img src="Images/clock.png" alt="Clock Icon" class="h-6 w-6 inline-block mr-2">
                    <p id="time7"></p>
                </div>
            </div>
        </div>
        
       

        <script>
            // Define the timezone of the schedule times
const scheduleTimezone = 'Europe/Amsterdam';

// Get the schedule times elements
const timeElements = Array.from({length: 7}, (_, i) => document.getElementById(`time${i + 1}`));

// Define the schedule times in the schedule timezone
const scheduleTimes = ['14:00 - 21:00', '13:00 - 16:00', '09:00 - 17:00', '09:00 - 17:00', '09:00 - 17:00', '10:00 - 15:00', 'Closed'];

// Convert the schedule times to the user's local timezone and display them
scheduleTimes.forEach((time, index) => {
    if (time === 'Closed') {
        timeElements[index].textContent = 'Closed';
    } else {
        const [start, end] = time.split(' - ').map(t => {
            const [hours, minutes] = t.split(':');
            const dateInScheduleTimezone = moment.tz([1970, 0, 1, hours, minutes], scheduleTimezone);

            return dateInScheduleTimezone.clone().tz(moment.tz.guess()).format('HH:mm');
        });

        timeElements[index].textContent = `${start} - ${end}`;
    }
});
        </script>
